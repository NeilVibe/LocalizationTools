[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
timeout = 120
timeout_method = thread
markers =
    health: Health endpoint tests
    auth: Authentication tests
    files: File upload/download tests
    rows: Row CRUD tests
    projects: Project management tests
    folders: Folder operation tests
    tm: Translation Memory tests
    gamedata: GameData browse/columns tests
    codex: Codex entity tests
    worldmap: World map data tests
    ai: AI intelligence tests
    search: Search functionality tests
    qa: QA and grammar tests
    merge: Merge operation tests
    export: Export pipeline tests
    offline: Offline mode tests
    admin: Admin/stats tests
    tools: External tools tests
    integration: Cross-subsystem integration tests
    brtag: br-tag preservation tests
    korean: Korean text handling tests
    slow: Tests that take >30 seconds
    feat001: Feature 001 TM auto-add tests
    task002: Task 002 tests
    requires_server: Tests requiring running server
addopts = -v --tb=short
